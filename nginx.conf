worker_processes 1;

events {
    worker_connections 4096;
}

http {
    access_log off;

    upstream app_backend {
        server api1:3000;
        server api2:3000;
        keepalive 128;
    }

    server {
        listen 9999;

        location / {
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_pass http://app_backend;
        }
    }
}
