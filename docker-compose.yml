services:
  nginx:
    image: nginx:1.27-alpine
    mem_limit: 10m
    cpus: "0.05"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9999:9999"
    depends_on:
      - api1
      - api2

  api1:
    image: rafaelcaram/rinha-rust-api:latest
    build:
      context: .
      dockerfile: Dockerfile
    mem_limit: 170m
    cpus: "0.475"
    volumes:
      - vectors-ram:/data
    environment:
      PORT: "3000"
      LOAD_SCORE_FILE: /data/references.bin
    entrypoint:
      ["/bin/sh", "-c", "if [ ! -f /data/references.bin ]; then cp /app/resources/references.bin /data/references.bin.tmp && mv /data/references.bin.tmp /data/references.bin; fi; exec /app/rinha-rust"]
  api2:
    image: rafaelcaram/rinha-rust-api:latest
    mem_limit: 170m
    cpus: "0.475"
    depends_on:
      - api1
    volumes:
      - vectors-ram:/data
    environment:
      PORT: "3000"
      LOAD_SCORE_FILE: /data/references.bin
    entrypoint:
      ["/bin/sh", "-c", "while [ ! -f /data/references.bin ]; do sleep 0.05; done; exec /app/rinha-rust"]

volumes:
  vectors-ram:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=256m"
