services:
  nginx:
    image: nginx:1.27-alpine
    mem_limit: 10m
    cpus: "0.05"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9999:9999"
    depends_on:
      - api1
      - api2

  api1:
    image: rafaelcaram/rinha-rust-api:latest
    mem_limit: 170m
    cpus: "0.475"
    environment:
      PORT: "3000"
      DATABASE_URL: /data/vectors.db
    entrypoint:
      ["/bin/sh", "-c", "if [ ! -f /data/vectors.db ]; then cp /app/resources/vectors.db /data/vectors.db; fi; exec /app/rinha-rust"]
    volumes:
      - db-ram:/data

  api2:
    image: rafaelcaram/rinha-rust-api:latest
    mem_limit: 170m
    cpus: "0.475"
    depends_on:
      - api1
    environment:
      PORT: "3000"
      DATABASE_URL: /data/vectors.db
    entrypoint:
      ["/bin/sh", "-c", "while [ ! -f /data/vectors.db ]; do sleep 0.05; done; exec /app/rinha-rust"]
    volumes:
      - db-ram:/data

volumes:
  db-ram:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
      o: "size=256m"
